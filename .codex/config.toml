model = "gpt-5.4"
model_reasoning_effort = "medium"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
codex_hooks = true

[agents.coder]
description = "Implements features based on PRD, WBS, and plan documents."
config_file = "./agents/coder.toml"

[agents.fixer]
description = "Fixes errors, failing tests, and broken builds."
config_file = "./agents/fixer.toml"

[agents.reviewer]
description = "Reviews code quality, architecture, and consistency."
config_file = "./agents/reviewer.toml"

[agents.tester]
description = "Creates and improves test coverage."
config_file = "./agents/tester.toml"

[agents]
job_max_runtime_seconds = 1200
